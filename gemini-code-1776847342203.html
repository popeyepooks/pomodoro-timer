<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>KRAMA. | Flow & Growth</title>
    <style>
        @font-face { font-family: 'DM Sans'; font-style: normal; font-weight: 400; src: url(https://fonts.gstatic.com/s/dmsans/v17/rP2Yp2ywxg089UriI5-g4vlH9VoD8Cmcqbu0-K4.woff2) format('woff2'); }
        @font-face { font-family: 'Space Mono'; font-style: normal; font-weight: 400; src: url(https://fonts.gstatic.com/s/spacemono/v17/i7dPIFZifjKcF5UAWdDRYEF8RQ.woff2) format('woff2'); }
        @font-face { font-family: 'Syne'; font-style: normal; font-weight: 700; src: url(https://fonts.gstatic.com/s/syne/v24/8vIH7w4qzmVxm2BL9A.woff2) format('woff2'); }

        :root {
            --bg: #050505; --sidebar: #0a0a0a; --card: #111111; --border: #1f1f1f;
            --accent: #e8c547; --text: #ffffff; --text-dim: #666;
            --p-high: #ff4d6d; --p-mid: #e8c547; --p-low: #00f5d4; --success: #00f5d4;
        }

        body { background-color: var(--bg); color: var(--text); font-family: 'DM Sans', sans-serif; margin: 0; display: flex; height: 100vh; overflow: hidden; }

        .sidebar { width: 320px; background: var(--sidebar); border-right: 1px solid var(--border); padding: 40px 24px; display: flex; flex-direction: column; gap: 30px; }
        .logo { font-family: 'Syne'; font-size: 1.8rem; font-weight: 800; letter-spacing: -1px; }
        .logo span { color: var(--accent); }

        .pomodoro-box { background: var(--card); border: 1px solid var(--border); border-radius: 24px; padding: 30px; text-align: center; }
        .timer-label { font-family: 'Space Mono'; font-size: 0.7rem; text-transform: uppercase; color: var(--text-dim); letter-spacing: 1px; }
        .timer-val { font-family: 'Space Mono'; font-size: 3.5rem; font-weight: 700; margin: 15px 0; }

        .controls { display: flex; justify-content: center; gap: 15px; }
        .ctrl-btn { background: #1a1a1a; border: 1px solid var(--border); color: white; width: 48px; height: 48px; border-radius: 50%; cursor: pointer; display: flex; align-items: center; justify-content: center; font-size: 1.2rem; transition: 0.2s; }
        .ctrl-btn.play { background: var(--accent); color: black; border: none; }

        .nav-links { display: flex; flex-direction: column; gap: 10px; margin-top: 20px; }
        .nav-item { background: none; border: 1px solid transparent; color: var(--text-dim); padding: 12px; border-radius: 8px; text-align: left; cursor: pointer; font-family: 'Syne'; font-weight: 600; text-transform: uppercase; font-size: 0.85rem; transition: 0.2s; }
        .nav-item:hover, .nav-item.active { background: #111; color: white; border-color: #1f1f1f; }

        .main-view { flex-grow: 1; padding: 40px 60px; overflow-y: auto; display: none; flex-direction: column; }
        .main-view.active { display: flex; }
        .header-top { display: flex; justify-content: space-between; align-items: flex-start; margin-bottom: 40px; }
        
        .quote-container { max-width: 80%; }
        .quote-container h2 { font-family: 'Syne'; font-size: 2.2rem; margin: 0; letter-spacing: -1px; line-height: 1.1; color: #fff; }
        .quote-container p { font-family: 'Space Mono'; color: var(--accent); font-size: 0.75rem; margin-top: 10px; text-transform: uppercase; letter-spacing: 2px; }

        .task-list { display: flex; flex-direction: column; gap: 12px; flex-grow: 1; margin-bottom: 20px; }
        .task-card { background: var(--card); border: 1px solid var(--border); border-radius: 16px; padding: 20px 25px; display: flex; align-items: center; justify-content: space-between; }
        .task-card.completed { opacity: 0.3; }
        .task-left { display: flex; align-items: center; gap: 25px; }
        .task-time { font-family: 'Space Mono'; font-size: 1rem; color: var(--accent); min-width: 65px; font-weight: 700; }
        .prio-dot { width: 10px; height: 10px; border-radius: 50%; }
        
        .input-bar { display: grid; grid-template-columns: 1fr 100px 150px 60px; gap: 12px; background: var(--card); padding: 15px; border-radius: 16px; border: 1px solid var(--border); position: sticky; bottom: 0; }
        input, select { background: #1a1a1a; border: 1px solid var(--border); color: white; padding: 12px; border-radius: 8px; font-family: DM Sans; outline: none; }
        .add-btn { background: var(--accent); border: none; border-radius: 8px; cursor: pointer; font-weight: 700; font-size: 1.2rem; }

        .stats-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 20px; margin-bottom: 20px; }
        .stat-card { background: var(--card); border: 1px solid var(--border); border-radius: 16px; padding: 25px; position: relative; }
        .stat-label { font-family: 'Space Mono'; color: var(--text-dim); text-transform: uppercase; font-size: 0.7rem; }
        .stat-val { font-size: 2.2rem; font-family: 'Syne'; font-weight: 700; color: var(--accent); margin-top: 8px; }
        .improvement-chip { position: absolute; top: 25px; right: 25px; font-family: 'Space Mono'; font-size: 0.7rem; padding: 4px 8px; border-radius: 4px; background: rgba(0,245,212,0.1); color: var(--success); }

        .graph-container { background: var(--card); border: 1px solid var(--border); border-radius: 16px; padding: 30px; height: 260px; margin-top: 20px; }
        .bars { display: grid; grid-auto-columns: 1fr; grid-auto-flow: column; gap: 8px; height: 180px; align-items: end; border-bottom: 1px solid #222; margin-top: 15px; }
        .bar { background: #1a1a1a; width: 100%; border-radius: 4px 4px 0 0; transition: height 0.6s ease; }
        .bar-label { font-family: 'Space Mono'; font-size: 8px; color: var(--text-dim); margin-top: 8px; text-align: center; }
        .btn-action { background: none; border: none; cursor: pointer; color: #444; font-size: 1.1rem; }
    </style>
</head>
<body>

    <div class="sidebar">
        <div class="logo">KRAMA<span>.</span></div>
        <div class="pomodoro-box">
            <div class="timer-label" id="pom-state">Deep Work</div>
            <div class="timer-val" id="timer">25:00</div>
            <div class="controls">
                <button class="ctrl-btn" onclick="resetTimer()">↺</button>
                <button class="ctrl-btn play" onclick="toggleTimer()" id="play-btn">▶</button>
                <button class="ctrl-btn" onclick="skipSession()">➡</button>
            </div>
        </div>
        
        <div class="nav-links">
            <button class="nav-item active" onclick="switchView('flow')">■ Flow State</button>
            <button class="nav-item" onclick="switchView('stats')">📊 Analytics</button>
        </div>

        <div style="margin-top: auto;">
            <div style="height: 2px; background: #222;">
                <div id="progress-bar" style="width: 0%; height: 100%; background: var(--accent); transition: 0.5s;"></div>
            </div>
        </div>
    </div>

    <div class="main-view active" id="view-flow">
        <div class="header-top">
            <div class="quote-container">
                <h2 id="dynamic-quote">WORK IN SILENCE.</h2>
                <p id="quote-subtext">PROVE THEM WRONG</p>
            </div>
        </div>
        <div class="task-list" id="task-list"></div>
        <div class="input-bar">
            <input type="text" id="in-name" placeholder="Define the next win...">
            <input type="number" id="in-mins" placeholder="Mins">
            <select id="in-prio">
                <option value="high">High</option>
                <option value="mid" selected>Mid</option>
                <option value="low">Low</option>
            </select>
            <button class="add-btn" onclick="addTask()">+</button>
        </div>
    </div>

    <div class="main-view" id="view-stats">
        <div class="header-top">
            <div class="quote-container">
                <h2>BEYOND THE NOISE.</h2>
                <p>GROWTH METRICS</p>
            </div>
        </div>
        <div class="stats-grid">
            <div class="stat-card">
                <div class="stat-label">Tasks Done (Today)</div>
                <div class="stat-val" id="count-today">0</div>
            </div>
            <div class="stat-card">
                <div class="stat-label">Lifetime Tasks</div>
                <div class="stat-val" id="count-lifetime">0</div>
            </div>
            <div class="stat-card">
                <div class="stat-label">Daily Focus Time</div>
                <div class="stat-val" id="time-today">0m</div>
                <div id="improvement-index" class="improvement-chip">0% Improvement</div>
            </div>
            <div class="stat-card">
                <div class="stat-label">Weekly Average</div>
                <div class="stat-val" id="time-avg">0m</div>
            </div>
        </div>
        <div class="graph-container">
            <div class="bars" id="graph-bars"></div>
        </div>
    </div>

    <script>
        // --- AUDIO GENERATOR ---
       function playAlertSound() {
            const context = new (window.AudioContext || window.webkitAudioContext)();
            
            // Create a sequence of 3 sharp, annoying beeps
            for (let i = 0; i < 3; i++) {
                const startTime = context.currentTime + (i * 0.3);
                const stopTime = startTime + 0.2;

                const osc = context.createOscillator();
                const gain = context.createGain();
                
                // 'square' is buzzier and more annoying than 'sine'
                osc.type = 'square'; 
                
                // Alternate between high-pitched frequencies to be jarring
                osc.frequency.setValueAtTime(i % 2 === 0 ? 1000 : 1500, startTime);
                
                gain.gain.setValueAtTime(0.2, startTime); // Loudness
                gain.gain.exponentialRampToValueAtTime(0.01, stopTime);
                
                osc.connect(gain);
                gain.connect(context.destination);
                
                osc.start(startTime);
                osc.stop(stopTime);
            }
        }

        // --- QUOTE LIBRARY ---
        const gritQuotes = [
            "WORK IN SILENCE.", "LET SUCCESS ROAR.", "PROVE THEM WRONG.", "DOUBT IS FUEL.",
            "STAY IN THE SHADOWS.", "THEY ARE SLEEPING.", "OUTWORK THE LOUD.", "RESULTS OVER NOISE.",
            "BUILD IN PRIVATE.", "WHISPER YOUR DREAMS.", "EXECUTE IN COLD BLOOD.", "BECOME THE OUTLIER.",
            "OBSESSION WINS.", "SILENCE THE CRITICS.", "GRIND UNTIL IT HURTS.", "THEY DON'T KNOW YET.",
            "SHUT UP AND MOVE.", "WINNING IS LONELY.", "IGNORE THE AUDIENCE.", "MASTER THE MUNDANE.",
            "BE THE DARK HORSE.", "DISCIPLINE IS FREEDOM."
        ];

        function rotateQuote() {
            const now = new Date();
            const seed = now.getFullYear() + now.getMonth() + now.getDate() + now.getHours();
            const index = seed % gritQuotes.length;
            document.getElementById('dynamic-quote').innerText = gritQuotes[index];
        }

        // --- DATA PERSISTENCE ---
        let tasks = JSON.parse(localStorage.getItem('krama_tasks')) || [];
        let history = JSON.parse(localStorage.getItem('krama_history')) || {}; 
        let lifetimeTasks = parseInt(localStorage.getItem('krama_lifetime')) || 0;

        const POM_TIME = 25 * 60;
        let timerRunning = false;
        let timerInterval;
        let timeLeft = POM_TIME;
        let currentType = 'work';

        function saveData() {
            localStorage.setItem('krama_tasks', JSON.stringify(tasks));
            localStorage.setItem('krama_history', JSON.stringify(history));
            localStorage.setItem('krama_lifetime', lifetimeTasks);
        }

        function getToday() { return new Date().toISOString().split('T')[0]; }

        function switchView(v) {
            document.querySelectorAll('.main-view, .nav-item').forEach(el => el.classList.remove('active'));
            if(v === 'flow') {
                document.getElementById('view-flow').classList.add('active');
                document.querySelector('.nav-item[onclick*="flow"]').classList.add('active');
            } else {
                document.getElementById('view-stats').classList.add('active');
                document.querySelector('.nav-item[onclick*="stats"]').classList.add('active');
                renderAnalytics();
            }
        }

        function updateFlow() {
            const list = document.getElementById('task-list');
            list.innerHTML = '';
            let rolling = new Date();
            tasks.forEach(t => {
                const time = rolling.toLocaleTimeString([], { hour: '2-digit', minute: '2-digit', hour12: false });
                list.innerHTML += `
                    <div class="task-card ${t.done ? 'completed' : ''}">
                        <div class="task-left">
                            <div class="task-time">${time}</div>
                            <div class="prio-dot" style="background:var(--p-${t.prio}); box-shadow:0 0 10px var(--p-${t.prio})"></div>
                            <div class="task-name">${t.name}</div>
                        </div>
                        <div>
                            <button class="btn-action" onclick="toggleTask(${t.id})">✓</button>
                            <button class="btn-action" onclick="delTask(${t.id})">×</button>
                        </div>
                    </div>`;
                if(!t.done) rolling.setMinutes(rolling.getMinutes() + parseInt(t.mins));
            });
            const done = tasks.filter(x => x.done).length;
            document.getElementById('progress-bar').style.width = tasks.length ? (done/tasks.length)*100 + '%' : '0%';
            saveData();
        }

        function addTask() {
            const n = document.getElementById('in-name').value;
            const m = document.getElementById('in-mins').value;
            const p = document.getElementById('in-prio').value;
            if(n && m) {
                tasks.push({ id: Date.now(), name: n, mins: m, prio: p, done: false });
                document.getElementById('in-name').value = '';
                document.getElementById('in-mins').value = '';
                updateFlow();
            }
        }

        function toggleTask(id) {
            const t = tasks.find(x => x.id === id);
            if(t && !t.done) { t.done = true; lifetimeTasks++; }
            else if(t && t.done) { t.done = false; lifetimeTasks--; }
            updateFlow();
        }

        function delTask(id) { tasks = tasks.filter(x => x.id !== id); updateFlow(); }

        function toggleTimer() {
            if(!timerRunning) {
                if(currentType === 'work') updateFlow();
                timerRunning = true;
                document.getElementById('play-btn').innerText = '||';
                timerInterval = setInterval(tick, 1000);
            } else {
                timerRunning = false;
                document.getElementById('play-btn').innerText = '▶';
                clearInterval(timerInterval);
            }
        }

        function tick() {
            if(timeLeft > 0) {
                timeLeft--;
                const m = Math.floor(timeLeft/60), s = timeLeft%60;
                document.getElementById('timer').innerText = `${m}:${s<10?'0':''}${s}`;
            } else {
                completeSession();
            }
        }

        function completeSession() {
            clearInterval(timerInterval);
            timerRunning = false;
            document.getElementById('play-btn').innerText = '▶';
            playAlertSound();
            
            if(currentType === 'work') {
                const today = getToday();
                // Ensure we only log if the session actually passed (prevents skip-spamming)
                history[today] = (history[today] || 0) + 25;
                currentType = 'break'; 
                timeLeft = 5 * 60;
                document.getElementById('pom-state').innerText = "Break";
            } else {
                currentType = 'work'; 
                timeLeft = POM_TIME;
                document.getElementById('pom-state').innerText = "Deep Work";
            }
            saveData();
            updateTimerDisplay();
        }

        function resetTimer() { 
            clearInterval(timerInterval); 
            timeLeft = currentType==='work' ? POM_TIME : 300; 
            timerRunning=false; 
            document.getElementById('play-btn').innerText='▶'; 
            updateTimerDisplay(); 
        }
        
        function skipSession() { 
            completeSession(); 
        }

        function updateTimerDisplay() {
            const m = Math.floor(timeLeft/60), s = timeLeft%60;
            document.getElementById('timer').innerText = `${m}:${s<10?'0':''}${s}`;
        }

        function renderAnalytics() {
            const today = getToday();
            const todayMins = history[today] || 0;
            document.getElementById('count-today').innerText = tasks.filter(x => x.done).length;
            document.getElementById('count-lifetime').innerText = lifetimeTasks;
            document.getElementById('time-today').innerText = todayMins + 'm';
            
            const dates = Object.keys(history).sort();
            const last7 = dates.slice(-7).filter(d => d !== today);
            let sum = 0; last7.forEach(d => sum += history[d]);
            const avg = last7.length ? Math.round(sum/last7.length) : 0;
            document.getElementById('time-avg').innerText = avg + 'm';
            
            const imp = avg > 0 ? Math.round(((todayMins - avg)/avg)*100) : 0;
            const chip = document.getElementById('improvement-index');
            chip.innerText = (imp >= 0 ? '+' : '') + imp + '% Growth';
            
            const g = document.getElementById('graph-bars'); g.innerHTML = '';
            let max = 60; const data = [];
            for(let i=13; i>=0; i--) {
                const d = new Date(); d.setDate(d.getDate()-i);
                const s = d.toISOString().split('T')[0];
                const m = history[s] || 0; if(m > max) max = m;
                data.push({ label: d.getDate(), val: m, today: i===0 });
            }
            data.forEach(d => {
                const h = (d.val/max)*100;
                g.innerHTML += `
                    <div style="display:flex; flex-direction:column; align-items:center; height:100%; justify-content:flex-end;">
                        <div class="bar" style="height:${h}%; ${d.today?'background:var(--accent)':''}"></div>
                        <div class="bar-label">${d.label}</div>
                    </div>`;
            });
        }

        window.onload = () => {
            rotateQuote();
            updateFlow();
            updateTimerDisplay();
            setInterval(rotateQuote, 60000 * 60);
        };
    </script>
</body>
</html>
